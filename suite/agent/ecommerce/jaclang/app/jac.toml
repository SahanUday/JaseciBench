[project]
name = "ecommerce"
version = "0.1.0"
description = "E-commerce benchmark app: Jac fullstack reference implementation"
entry-point = "main.jac"

[serve]
base_route_app = "app"

[plugins.client.vite]
plugins = ["tailwindcss()"]
lib_imports = ["import tailwindcss from '@tailwindcss/vite'"]

[plugins.client.app_meta_data]
title = "Jac E-Commerce"
description = "Reference Jac fullstack e-commerce app"

[dependencies.npm]
react = "^18.2.0"
react-dom = "^18.2.0"
react-router-dom = "^6.22.0"
react-error-boundary = "^5.0.0"
clsx = "^2.1.1"
tailwind-merge = "^3.0.0"
lucide-react = "^0.468.0"
react-hook-form = "^7.71.0"
zod = "^4.3.6"
"@hookform/resolvers" = "^5.2.2"

[dependencies.npm.dev]
tailwindcss = "latest"
"@tailwindcss/vite" = "latest"
vite = "^6.4.1"
"@vitejs/plugin-react" = "^4.2.1"
typescript = "^5.3.3"
"@types/react" = "^18.2.0"
"@types/react-dom" = "^18.2.0"
